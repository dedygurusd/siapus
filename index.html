<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persiapan Ujian Sekolah - SDN 1 Sukadanaham</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [activeMapel, setActiveMapel] = useState(null);

            const subjects = [
                { id: 'pai', name: 'PAI', icon: '🌙', link: 'https://docs.google.com/document/d/1ShuQJAHNQYaSNwUFkrVzeLmCGtFZSbO4/edit?usp=drive_link' },
                { id: 'pp', name: 'Pend. Pancasila', icon: '🦅', link: 'https://docs.google.com/document/d/1zmamFgkl87V5JtNiIpeAynuyB9tVPIdQ/edit?usp=drive_link' },
                { id: 'indo', name: 'B. Indo', icon: '📝', link: 'https://docs.google.com/document/d/1fOoXXrnL0Pmrb024HR_EAV9ofx1puuba/edit?usp=drive_link' },
                { id: 'mtk', name: 'Mtk', icon: '🔢', link: 'https://docs.google.com/document/d/1bPHdCc63-NT7xtQfoxFpioi1EtZeGDax/edit?usp=drive_link' },
                { id: 'ipas', name: 'IPAS', icon: '🌍', link: 'https://docs.google.com/document/d/1ZkUlwp_VUGSKR6NtRfnUiuxR-uYJJmrV/edit?usp=drive_link' },
                { id: 'sb', name: 'SB', icon: '🎨', link: 'https://docs.google.com/spreadsheets/d/17anwhoIRbjozVr4aZWdcQhC3rXYNqvCD/edit?usp=drive_link' },
                { id: 'pjok', name: 'PJOK', icon: '⚽', link: 'https://docs.google.com/document/d/1cdqxCM_EdExS06d30PwnjOjkhV3-sF2i/edit?usp=drive_link' },
                { id: 'lampung', name: 'B. Lamp', icon: '📜', link: 'https://docs.google.com/document/d/1rHR9NDiJUGMBdC8hWd5qvUAYvw7V2dMx/edit?usp=drive_link' },
                { id: 'inggris', name: 'B. Ing', icon: '🇬🇧', link: 'https://docs.google.com/document/d/1kheR3q73hbRNAopUYvTv_biu-ZSr8NvR/edit?usp=drive_link' }
            ];

            const jadwalUjian = [
                { hari: 'Senin', tgl: '04 Mei 2026', m1: 'PAI', m2: 'B. Inggris' },
                { hari: 'Selasa', tgl: '05 Mei 2026', m1: 'B. Indonesia', m2: 'B. Lampung' },
                { hari: 'Rabu', tgl: '06 Mei 2026', m1: 'Pend. Pancasila', m2: 'Seni Budaya' },
                { hari: 'Kamis', tgl: '07 Mei 2026', m1: 'Matematika', m2: 'PJOK' },
                { hari: 'Jumat', tgl: '08 Mei 2026', m1: 'IPAS', m2: '-' }
            ];

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg text-white font-bold text-xl">US</div>
                                <div>
                                    <h1 className="font-bold text-gray-800 leading-tight">SDN 1 Sukadanaham</h1>
                                    <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Portal Kelas 6</p>
                                </div>
                            </div>
                            <nav className="flex gap-4 md:gap-8">
                                <button onClick={() => setActiveTab('home')} className={`text-sm font-bold ${activeTab === 'home' ? 'text-blue-600' : 'text-gray-500'}`}>Beranda</button>
                                <button onClick={() => setActiveTab('kisi')} className={`text-sm font-bold ${activeTab === 'kisi' ? 'text-blue-600' : 'text-gray-500'}`}>Kisi-kisi</button>
                                <button onClick={() => setActiveTab('jadwal')} className={`text-sm font-bold ${activeTab === 'jadwal' ? 'text-blue-600' : 'text-gray-500'}`}>Jadwal</button>
                            </nav>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="flex-grow max-w-6xl mx-auto w-full px-4 py-8">
                        {activeTab === 'home' && (
                            <div className="animate-fade-in space-y-8">
                                <div className="bg-blue-600 rounded-[2rem] p-8 md:p-16 text-white relative overflow-hidden shadow-xl">
                                    <div className="relative z-10">
                                        <h2 className="text-3xl md:text-5xl font-black mb-4">Siap Sukses Ujian Sekolah 2026!</h2>
                                        <p className="text-blue-100 mb-8 max-w-xl">Akses semua kisi-kisi dan jadwal ujian dalam satu tempat. Semangat belajarnya, Murid-murid Kelas 6!</p>
                                        <button onClick={() => setActiveTab('kisi')} className="bg-red-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-red-600 transition-all">Lihat Kisi-kisi Sekarang</button>
                                    </div>
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full -mr-20 -mt-20"></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
                                        <div className="text-3xl mb-2">📚</div>
                                        <h3 className="font-bold">9 Mata Pelajaran</h3>
                                        <p className="text-gray-500 text-sm">Dokumen lengkap siap unduh.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
                                        <div className="text-3xl mb-2">📅</div>
                                        <h3 className="font-bold">Mulai 4 Mei</h3>
                                        <p className="text-gray-500 text-sm">Cek jadwal sesi 1 dan sesi 2.</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
                                        <div className="text-3xl mb-2">🎓</div>
                                        <h3 className="font-bold">8 Dimensi Lulusan</h3>
                                        <p className="text-gray-500 text-sm">Wujudkan profil murid berprestasi.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'kisi' && (
                            <div className="animate-fade-in">
                                <h2 className="text-3xl font-bold text-gray-800 mb-8">Kisi-kisi Ujian Sekolah</h2>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                                    {subjects.map(s => (
                                        <button 
                                            key={s.id}
                                            onClick={() => setActiveMapel(s)}
                                            className={`p-6 rounded-2xl bg-white border-2 transition-all flex flex-col items-center ${activeMapel?.id === s.id ? 'border-red-500 shadow-lg scale-105' : 'border-transparent shadow-sm hover:border-blue-200'}`}
                                        >
                                            <span className="text-4xl mb-2">{s.icon}</span>
                                            <span className="font-bold text-gray-700">{s.name}</span>
                                        </button>
                                    ))}
                                </div>
                                {activeMapel && (
                                    <div className="mt-8 bg-white p-8 rounded-3xl border border-blue-100 shadow-xl animate-fade-in">
                                        <h3 className="text-2xl font-bold text-gray-800 mb-4">Mata Pelajaran: {activeMapel.name}</h3>
                                        <p className="text-gray-600 mb-6 italic">Pastikan Bapak/Ibu atau Murid sudah login ke Google Drive untuk kemudahan akses.</p>
                                        <a href={activeMapel.link} target="_blank" className="inline-block bg-red-500 text-white font-bold py-4 px-10 rounded-2xl shadow-lg hover:bg-red-600">Buka Link Dokumen</a>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'jadwal' && (
                            <div className="animate-fade-in">
                                <h2 className="text-3xl font-bold text-gray-800 mb-8">Jadwal Ujian Sekolah 2026</h2>
                                <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="bg-blue-600 text-white">
                                                <th className="p-5 font-bold">Hari / Tanggal</th>
                                                <th className="p-5 font-bold">Sesi 1</th>
                                                <th className="p-5 font-bold">Sesi 2</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {jadwalUjian.map((j, i) => (
                                                <tr key={i} className="hover:bg-blue-50 transition-colors">
                                                    <td className="p-5 font-bold text-gray-800">{j.hari}, {j.tgl}</td>
                                                    <td className="p-5 text-blue-700 font-semibold">{j.m1}</td>
                                                    <td className="p-5 text-gray-600 font-semibold">{j.m2}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-gray-200 py-8">
                        <div className="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p className="text-gray-500 text-sm">© 2026 SD Negeri 1 Sukadanaham</p>
                            <div className="bg-gray-100 px-4 py-2 rounded-full border border-gray-200 text-sm font-bold text-gray-700 flex items-center gap-2">
                                <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                Situs ini dikembangkan oleh Dedy W.K.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
